name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - ConfigServer
          - EurekaServer
          - GatewayServer
          - EgovAuthor
          - EgovBoard
          - EgovCmmnCode
          - EgovLogin
          - EgovLoginPolicy
          - EgovMain
          - EgovMobileId
          - EgovQuestionnaire
          - EgovSearch
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.module }}
        run: mvn -B -ntp -f ${{ matrix.module }}/pom.xml package -DskipTests
